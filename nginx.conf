events {}
http {
    include mime.types;
    types {
        application/wasm wasm;
    }
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html =404;
        }

        location ~* \.(dll|wasm|json|js|css|png|jpg|svg|ico)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}