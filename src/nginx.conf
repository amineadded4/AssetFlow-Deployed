events {}
http {
    include mime.types;
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ /index.html;
        }
        location /mediapipe/ {
            add_header Cache-Control "public, max-age=31536000";
        }
    }
}